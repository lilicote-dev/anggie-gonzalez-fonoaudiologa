<style>

  


body{
    margin:0;

.menu{
    width:250px;
    height:100vh;
    background:linear-gradient(to bottom,#7b2cbf,#c77dff);
    position:fixed;
    padding-top:30px;

.menu h2{
    color:white;

.menu a{
    display:block;

    padding:15px;
    margin:10px;
    border-radius:10px;
    font-size:18px;
    transition:0.3s;
}

.menu a:hover{
    background:rgba(255,255,255,0.2);
    padding-left:25px;
    transition:0.3s;

}

.contenido{

}

.bienvenida{
    background:white;
    padding:30px;
    border-radius:20px;

}

.bienvenida h1{
    color:#7b2cbf;
    font-size:40px;
}

.bienvenida p{
    font-size:18px;
    color:#555;
}

.tarjetas{
    display:flex;
    gap:25px;
    margin-top:30px;
}

.tarjeta{
    width:220px;
    padding:30px;
    border-radius:25px;
    text-align:center;
    color:white;
    backdrop-filter:blur(10px);
    background:rgba(255,255,255,0.2);
    border:1px solid rgba(255,255,255,0.3);
    box-shadow:0px 8px 20px rgba(0,0,0,0.15);
    transition:0.3s;

}

.tarjeta:hover{
    transform:translateY(-10px);
}

.reloj{
    margin-top:20px;
    color:#7b2cbf;
}

</style>

<script>
    

function actualizarReloj(){

    let fecha = new Date();

    document.getElementById("reloj").innerHTML =
    fecha.toLocaleTimeString();

    document.getElementById("fecha").innerHTML =
    fecha.toLocaleDateString();

}

actualizarReloj();

setInterval(actualizarReloj,1000);
window.onload = function(){

    let pacientes = localStorage.getItem("pacientes");
    let citas = localStorage.getItem("citas");

    let totalPacientes = 0;
    let totalCitas = 0;

    if(pacientes){
        totalPacientes =
        (pacientes.match(/<tr>/g) || []).length - 1;
    }

    if(citas){
        totalCitas =
        (citas.match(/<tr>/g) || []).length - 1;
    }

    document.getElementById("totalPacientes").innerHTML =
        totalPacientes + " registrados";

    document.getElementById("totalCitas").innerHTML =
        totalCitas + " citas";

    actualizarReloj();
    setInterval(actualizarReloj,1000);
