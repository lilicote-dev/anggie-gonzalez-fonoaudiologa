<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro - FonoApp</title>

<style>
body{
    background:#f3e8ff;
    font-family:Arial;
}

.registro{
    width:90%;
    max-width:400px;
    background:white;
    margin:100px auto;
    padding:40px;
    border-radius:25px;
    text-align:center;
    box-shadow:0px 0px 20px rgba(0,0,0,0.1);
}

input{
    width:90%;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #ccc;
}

button{
    background:#c77dff;
    color:white;
    border:none;
    padding:15px 30px;
    border-radius:15px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="registro">

<h1>Crear Cuenta</h1>

<input id="nombre" type="text" placeholder="Nombre">

<input id="correo" type="email" placeholder="Correo">

<input id="clave" type="password" placeholder="Contraseña">

<button onclick="registrar()">
Crear Cuenta
</button>

</div>

<script>

function registrar(){

    let nombre = document.getElementById("nombre").value;
    let correo = document.getElementById("correo").value;
    let clave = document.getElementById("clave").value;

    let usuarios =
    JSON.parse(localStorage.getItem("usuarios")) || [];

    usuarios.push({
        nombre:nombre,
        correo:correo,
        clave:clave
    });

    localStorage.setItem(
    "usuarios",
    JSON.stringify(usuarios)
);

window.location.href = "login.html";
}

</script>

</body>
</html>
